<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Calculadora Simples</title>
</head>
<body>

    <h2>Calculadora Simples</h2>

    <form id="calcForm">
        
            <label for="lblnum1">Primeiro Número:</label><br>
            <input type="number" id="num1" required><br>
       

         
            <label for="lblnum2">Segundo Número:</label><br>
            <input type="number" id="num2" required><br><br>
        
         
        <button type="button" onclick="calcular('soma')">Somar</button>
        <button type="button" onclick="calcular('sub')">Subtrair</button>
        <button type="button" onclick="calcular('multi')">Multiplicar</button>
        <button type="button" onclick="calcular('div')">Dividir</button>
    </form>

    <div id="resultado"></div>
<script src="script.js"> </script>
</body>
</html>
